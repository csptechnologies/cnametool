<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caller Name Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <h1 class="mb-4 text-center">Caller Name Lookup</h1>
        
        <form method="POST" action="/">
            <div class="mb-3">
                <label for="phone_number" class="form-label fw-bold">Phone Number</label>
                <input type="text" class="form-control" id="phone_number" name="phone_number" placeholder="+1234567890" value="{{ rawinput or '' }}" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary w-100">Lookup</button>
        </form>

        {% if error %}
            <div class="alert alert-danger mt-4" role="alert">
                <strong>Error:</strong> {{ error }}
            </div>
        {% endif %}

        {% if csp_response %}
            <div class="card mt-4 shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Lookup Results</h5>
                </div>
                <div class="card-body">
                    <div class="p-3 rounded border border-secondary text-light bg-dark font-monospace" style="white-space: pre-wrap;">{{ csp_response }}</div>
                </div>
            </div>
        {% endif %}
    </div>
    </body>
</html>
